name: 'Setup Bazel with Caching'
description: 'Sets up Bazel with standard caching configuration'

inputs:
  cache-key:
    description: 'The cache key to use for disk-cache'
    required: false
    default: ${{ github.workflow }}
  cache-save:
    description: 'Whether to save caches'
    required: false
    default: 'true'

runs:
  using: "composite"
  steps:
    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        # Avoid downloading Bazel every time
        bazelisk-cache: true
        # Bump version to bypass stale cache
        cache-version: "2"
        # Store build cache per workflow
        disk-cache: ${{ inputs.cache-key || github.workflow }}
        # Share repository cache between workflows
        repository-cache: true
        # Enable external repository cache
        external-cache: true
        # Control whether to save caches
        cache-save: ${{ inputs.cache-save }}
