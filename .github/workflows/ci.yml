name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive
  UV_CACHE_DIR: /tmp/.uv-cache

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@v4
      - name: Restore uv cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            uv-${{ runner.os }}-main-
            uv-${{ runner.os }}-
      - name: Install dependencies
        run: uv sync --all-packages --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Type check (ty)
        run: uv run ty check src/python
      - name: Minimize uv cache
        run: uv cache prune --ci

  test:
    needs: [lint]
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@v4
      - name: Restore uv cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            uv-${{ runner.os }}-main-
            uv-${{ runner.os }}-
      - name: Install dependencies
        run: uv sync --all-packages --frozen
      - name: Test
        run: uv run pytest src/python
      - name: Minimize uv cache
        run: uv cache prune --ci

  integration:
    needs: [test]
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache chezmoi downloads
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.chezmoi-cache
          key: chezmoi-cache-v4-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('src/chezmoi/.chezmoidata/**', 'src/chezmoi/.chezmoidata.toml', 'src/chezmoi/**/.chezmoiexternals/**') }}
          restore-keys: |
            chezmoi-cache-v4-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            chezmoi-cache-v4-${{ runner.os }}-main-
            chezmoi-cache-v4-${{ runner.os }}-

      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b ~/.local/bin -t v2.70.0
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Initialize chezmoi
        run: |
          mkdir -p /tmp/chezmoi-test
          chezmoi init --cache=~/.chezmoi-cache --source=${{ github.workspace }} --destination=/tmp/chezmoi-test

      - name: Run chezmoi doctor
        run: chezmoi doctor --cache=~/.chezmoi-cache --source=${{ github.workspace }} --destination=/tmp/chezmoi-test --no-network

      - name: Run chezmoi apply
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOMAXPROCS: "1"
        run: chezmoi apply --cache=~/.chezmoi-cache --source=${{ github.workspace }} --destination=/tmp/chezmoi-test

  summary:
    if: always()
    needs: [lint, test, integration]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Report results
        run: |
          echo "=== CI Summary ==="
          echo "Lint:        ${{ needs.lint.result }}"
          echo "Test:        ${{ needs.test.result }}"
          echo "Integration: ${{ needs.integration.result }}"

          if [[ "${{ needs.lint.result }}" == "failure" ||
                "${{ needs.test.result }}" == "failure" ||
                "${{ needs.integration.result }}" == "failure" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All checks passed"
