name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive
  UV_CACHE_DIR: /tmp/.uv-cache
  MISE_CACHE_DIR: /tmp/.mise-cache

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Check no chezmoi config template exists
        run: |
          root=$(cat .chezmoiroot | tr -d '[:space:]')
          for f in "$root/.chezmoi.toml" "$root/.chezmoi.toml.tmpl"; do
            if [ -f "$f" ]; then
              echo "::error file=$f::Config file must not exist in source — config is expected to be injected by the invoking repository. Use .chezmoidata/ for defaults."
              exit 1
            fi
          done
      - uses: jdx/mise-action@v4
      - name: Restore uv cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            uv-${{ runner.os }}-main-
            uv-${{ runner.os }}-
      - name: Install dependencies
        run: uv sync --all-packages --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Type check (ty)
        run: uv run ty check
      - name: Minimize uv cache
        run: uv cache prune --ci

  test:
    needs: [lint]
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: jdx/mise-action@v4
      - name: Restore uv cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            uv-${{ runner.os }}-main-
            uv-${{ runner.os }}-
      - name: Install dependencies
        run: uv sync --all-packages --frozen
      - name: Test
        run: uv run pytest src/python
      - name: Build all packages
        run: uv build --all-packages
      - name: Minimize uv cache
        run: uv cache prune --ci

  integration:
    needs: [test]
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Cache chezmoi downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.chezmoi-cache
          key: chezmoi-cache-v4-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('src/chezmoi/.chezmoidata/**', 'src/chezmoi/.chezmoidata.toml', 'src/chezmoi/**/.chezmoiexternals/**') }}
          restore-keys: |
            chezmoi-cache-v4-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            chezmoi-cache-v4-${{ runner.os }}-main-
            chezmoi-cache-v4-${{ runner.os }}-

      - name: Cache mise downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ${{ env.MISE_CACHE_DIR }}
          key: mise-cache-v1-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('src/chezmoi/.chezmoidata/mise.toml') }}
          restore-keys: |
            mise-cache-v1-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            mise-cache-v1-${{ runner.os }}-main-
            mise-cache-v1-${{ runner.os }}-

      - name: Install chezmoi
        run: |
          sh -c "$(curl --retry 5 -fsLS get.chezmoi.io)" -- -b ~/.local/bin -t v2.70.0
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Initialize chezmoi
        run: |
          mkdir -p /tmp/chezmoi-test
          chezmoi init --cache=~/.chezmoi-cache --source=${{ github.workspace }} --destination=/tmp/chezmoi-test

      - name: Run chezmoi doctor
        run: chezmoi doctor --cache=~/.chezmoi-cache --source=${{ github.workspace }} --destination=/tmp/chezmoi-test --no-network

      - name: Run chezmoi apply
        env:
          HOME: /tmp/chezmoi-test
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOMAXPROCS: "1"
        run: chezmoi apply --cache=~/.chezmoi-cache --source=${{ github.workspace }} --destination=/tmp/chezmoi-test

      - name: Prune mise cache
        run: |
          MISE_BIN_DIR=$(chezmoi --source=${{ github.workspace }} --destination=/tmp/chezmoi-test target-path ${{ github.workspace }}/src/chezmoi/dot_local/bin)
          echo "$MISE_BIN_DIR" >> $GITHUB_PATH
          "$MISE_BIN_DIR/mise" cache prune --yes

      - name: Install python dependencies for integration tests
        env:
          HOME: /tmp/chezmoi-test
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mise exec -- uv sync --all-packages --frozen

      - name: Run system integration tests
        env:
          CHEZMOI_DEST: /tmp/chezmoi-test
          HOME: /tmp/chezmoi-test
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mise exec -- uv run pytest tests/integration


