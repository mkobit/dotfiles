name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive
  UV_CACHE_DIR: /tmp/.uv-cache
  UV_PYTHON_INSTALL_DIR: /tmp/.uv-python
  MISE_CACHE_DIR: /tmp/.mise-cache
  BUN_INSTALL_CACHE_DIR: /tmp/.bun-cache
  CHEZMOI_CACHE_DIR: /tmp/.chezmoi-cache
  CHEZMOI_CONFIG: /tmp/.chezmoi-config.toml
  CHEZMOI_DEST: /tmp/chezmoi-test
  CHEZMOI_VERSION: v2.71.0

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: jdx/mise-action@v4.2.1
        with:
          # Pin to match .chezmoidata/bin/mise.toml. Without this, the
          # action falls back to a default that may be yanked from upstream.
          version: 2026.7.7
      - name: Restore uv cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            uv-${{ runner.os }}-main-
            uv-${{ runner.os }}-
      - name: Install dependencies
        run: uv sync --all-packages --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Type check (ty)
        run: uv run ty check
      - name: Minimize uv cache
        run: uv cache prune --ci

  skill-filter-compat:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: jdx/mise-action@v4.2.1
        with:
          version: 2026.7.7
      - name: Restore uv Python cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ env.UV_PYTHON_INSTALL_DIR }}
          key: uv-python-3.8-${{ runner.os }}
      - name: Install Python 3.8
        run: uv python install 3.8
      - name: Test skill_filter on Python 3.8
        env:
          PYTHONPATH: src/python/skill_filter
          UV_PYTHON_DOWNLOADS: manual
        run: uv run --no-project --python 3.8 --with pytest -- python -m pytest src/python/skill_filter/tests/ -q

  test:
    needs: [lint]
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: jdx/mise-action@v4.2.1
        with:
          # Pin to match .chezmoidata/bin/mise.toml. Without this, the
          # action falls back to a default that may be yanked from upstream.
          version: 2026.7.7
      - name: Restore uv cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            uv-${{ runner.os }}-main-
            uv-${{ runner.os }}-
      - name: Install dependencies
        run: uv sync --all-packages --frozen
      - name: Test
        run: uv run pytest src/python --cov --cov-report=term-missing
      - name: Build all packages
        run: uv build --all-packages
      - name: Minimize uv cache
        run: uv cache prune --ci

  integration:
    needs: [lint]
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Load scoped AppArmor profile for bwrap
        if: runner.os == 'Linux'
        # Ubuntu 24.04's AppArmor default blocks unprivileged CLONE_NEWUSER
        # for otherwise-unconfined processes, which bwrap needs for rootless
        # sandboxing -- without this, sandboxr's bwrap-backed integration
        # tests fail with "setting up uid map: Permission denied" /
        # "loopback: Failed RTM_NEWADDR". A profile scoped to /usr/bin/bwrap
        # that grants it `userns,` exempts only that binary; every other
        # process on the runner keeps the restriction, unlike flipping
        # kernel.apparmor_restrict_unprivileged_userns off runner-wide.
        # Ref: https://discourse.ubuntu.com/t/spec-unprivileged-user-namespace-restrictions-via-apparmor-in-ubuntu-23-10/37626
        run: |
          cat <<'PROFILE' | sudo tee /etc/apparmor.d/bwrap >/dev/null
          abi <abi/4.0>,

          /usr/bin/bwrap flags=(unconfined) {
            allow userns create,
          }
          PROFILE
          sudo apparmor_parser -r /etc/apparmor.d/bwrap

      - name: Cache chezmoi downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ env.CHEZMOI_CACHE_DIR }}
          key: chezmoi-cache-v4-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('src/chezmoi/.chezmoidata/**', 'src/chezmoi/.chezmoidata.toml', 'src/chezmoi/**/.chezmoiexternals/**') }}
          restore-keys: |
            chezmoi-cache-v4-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            chezmoi-cache-v4-${{ runner.os }}-main-
            chezmoi-cache-v4-${{ runner.os }}-

      - name: Cache mise downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ env.MISE_CACHE_DIR }}
          key: mise-cache-v1-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('src/chezmoi/.chezmoidata/bin/mise.toml') }}
          restore-keys: |
            mise-cache-v1-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            mise-cache-v1-${{ runner.os }}-main-
            mise-cache-v1-${{ runner.os }}-

      - name: Cache bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ env.BUN_INSTALL_CACHE_DIR }}
          key: bun-cache-v1-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('src/chezmoi/.chezmoidata/bin/mise.toml') }}
          restore-keys: |
            bun-cache-v1-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            bun-cache-v1-${{ runner.os }}-main-
            bun-cache-v1-${{ runner.os }}-

      - name: Restore uv cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-
            uv-${{ runner.os }}-main-
            uv-${{ runner.os }}-

      - name: Install chezmoi
        run: |
          sh -c "$(curl --retry 5 -fsLS get.chezmoi.io)" -- -b ~/.local/bin -t ${{ env.CHEZMOI_VERSION }}
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Initialize chezmoi
        run: |
          mkdir -p ${{ env.CHEZMOI_DEST }}
          chezmoi init \
            --cache=${{ env.CHEZMOI_CACHE_DIR }} \
            --source=${{ github.workspace }} \
            --destination=${{ env.CHEZMOI_DEST }} \
            --config-path=${{ env.CHEZMOI_CONFIG }}

      - name: Run chezmoi doctor
        run: |
          chezmoi doctor \
            --cache=${{ env.CHEZMOI_CACHE_DIR }} \
            --config=${{ env.CHEZMOI_CONFIG }} \
            --source=${{ github.workspace }} \
            --destination=${{ env.CHEZMOI_DEST }} \
            --no-network

      - name: Run chezmoi apply
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOMAXPROCS: "1"
        run: |
          chezmoi apply \
            --cache=${{ env.CHEZMOI_CACHE_DIR }} \
            --config=${{ env.CHEZMOI_CONFIG }} \
            --source=${{ github.workspace }} \
            --destination=${{ env.CHEZMOI_DEST }}

      - name: Prune mise cache
        run: |
          MISE_BIN_DIR=$(chezmoi \
            --config=${{ env.CHEZMOI_CONFIG }} \
            --source=${{ github.workspace }} \
            --destination=${{ env.CHEZMOI_DEST }} \
            target-path ${{ github.workspace }}/src/chezmoi/dot_local/bin)
          echo "$MISE_BIN_DIR" >> $GITHUB_PATH
          "$MISE_BIN_DIR/mise" cache prune --yes

      - name: Install python dependencies for integration tests
        env:
          HOME: ${{ env.CHEZMOI_DEST }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mise exec -- uv sync --all-packages --frozen

      - name: Run system integration tests
        env:
          HOME: ${{ env.CHEZMOI_DEST }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mise exec -- uv run pytest tests/integration


