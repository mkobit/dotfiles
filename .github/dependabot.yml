version: 2
updates:
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  cooldown:
    default-days: 14
  open-pull-requests-limit: 10
  groups:
    github-actions:
      patterns:
      - '*'
  reviewers:
  - mkobit
  assignees:
  - mkobit
  commit-message:
    prefix: chore(deps)
    include: scope

- package-ecosystem: "uv"
  directory: /
  schedule:
    interval: weekly
  cooldown:
    default-days: 14
  open-pull-requests-limit: 10
  groups:
    python-dependencies:
      patterns:
      - '*'
  reviewers:
  - mkobit
  assignees:
  - mkobit
  commit-message:
    prefix: chore(deps)
    include: scope
