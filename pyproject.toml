[project]
name = "dotfiles"
version = "0.0.0"
requires-python = ">=3.14"
dependencies = [
    "aiohttp>=3.11",
    "click>=8.1",
    "faster-whisper>=1.0",
    "jinja2>=3.1",
    "pydantic>=2.10",
    "tqdm>=4.67",
    "whenever>=0.6.1",
    "python-frontmatter>=1.1",
    "types-PyYAML>=6.0.12",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.25",
    "ruff>=0.11",
    "ty>=0.0.1a10",
]

[tool.uv.workspace]
members = [
    "src/python/jules_cli",
    "src/python/claude_statusline",
    "src/python/transcribe",
]

[tool.ruff]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "C90", # mccabe
]
ignore = [
    "UP043", # Unnecessary default type arguments
]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.isort]
known-first-party = ["jules_cli", "claude_statusline", "transcribe"]

[tool.ty.environment]
python = ".venv"

[tool.ty.rules]
all = "error"

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = [
    "src/python/jules_cli",
    "src/python/claude_statusline",
    "src/python/transcribe",
]
