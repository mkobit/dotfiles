[project]
name = "dotfiles"
version = "0.0.0"
requires-python = ">=3.14"
dependencies = [
    "jules-cli",
    "transcribe",
    "claude-statusline",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.25",
    "ruff>=0.11",
    "ty>=0.0.1a10",
    "pytest-testinfra>=10",
    "djlint>=1.36.4",
    "pre-commit>=4.5.1",
]

[tool.uv.workspace]
members = [
    "src/python/jules_cli",
    "src/python/claude_statusline",
    "src/python/transcribe",
]

[tool.uv.sources]
jules-cli = { workspace = true }
transcribe = { workspace = true }
claude-statusline = { workspace = true }

[tool.ruff]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "C90", # mccabe
]
ignore = [
    "UP043", # Unnecessary default type arguments
]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.isort]
known-first-party = ["jules_cli", "claude_statusline", "transcribe"]

[tool.ty.environment]
python = ".venv"

[tool.ty.rules]
all = "error"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.djlint]
profile = "golang"
extension = "tmpl"
preserve_blank_lines = true
ignore = "H031,H017,H006,T008"
ignore_blocks = "shell,bash,zsh,python,toml,ini,conf"
custom_blocks = "if,range,with"
