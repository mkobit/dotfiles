[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "UP", # pyupgrade
    "N",  # pep8-naming
    "C90", # mccabe
]
ignore = [
    "UP043", # Unnecessary default type arguments (Conflics with Mypy strict mode for AsyncGenerator)
]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.isort]
known-first-party = ["src", "tools"]

[tool.ty.rules]
# Treat rules as error by default
all = "error"
