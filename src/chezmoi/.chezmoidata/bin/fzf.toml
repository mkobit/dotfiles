[fzf]
version             = "0.71.0"
installation_method = "chezmoi_external"
repo                = "junegunn/fzf"
external_type       = "archive-file"
executable          = true
checksum_type       = "sha256"
tag_format          = "v{version}"
filename_format     = "fzf-{version}-{os}_{arch}.tar.gz"
path_format         = "fzf"
url_format          = "{base}/{repo}/releases/download/{tag}/{filename}"

[fzf.package.homebrew]
name = "fzf"
type = "formula"

# fzf uses raw {os}_{arch} in the filename — no target triple
# platforms map still needed to gate unsupported platforms; value unused in filename
[fzf.platforms]
darwin_arm64 = "arm64"
darwin_amd64 = "amd64"
linux_amd64  = "amd64"
linux_arm64  = "arm64"

[fzf.checksums]
