# mise version already includes "v" prefix — tag_format = "{version}" (no added v)
[bin.mise]
version = "v2026.7.7"

[bin.mise.github_releases]
repo            = "jdx/mise"
external_type   = "file"
executable      = true
checksum_type   = "sha256"
tag_format      = "{version}"
filename_format = "mise-{version}-{target}"
url_format      = "{base}/{repo}/releases/download/{tag}/{filename}"

[bin.mise.github_releases.platforms]
darwin_arm64 = "macos-arm64"
darwin_amd64 = "macos-x64"
linux_amd64  = "linux-x64"
linux_arm64  = "linux-arm64"

[bin.mise.github_releases.checksums]
darwin_arm64 = "5b890cccc75fc43a494b83ace21dbd2ee26120ff19ba1994cdcd054b3a15abbd"
darwin_amd64 = "7b860e6495eea9a264a16dae575ac20d5618ea2fe97905756c661eb02035c5d9"
linux_amd64  = "429f71e7e989908bf975aafac9066329c16e2d8fc7cd8e74fdf21dd6300ffe7c"
linux_arm64  = "1b4ef061d25f0ceb508f11169482f3074e55c1698a1494f666386b2fcfb46b9b"

[mise]

[mise.settings]
# Configuration settings: https://mise.jdx.dev/configuration/settings.html
cache_prune_age = "60 days"
disable_hints   = ["self_update"]
http_retries    = 5
install_before  = "7d"
log_level     = "warn"
[mise.settings.npm]
package_manager = "bun"

[mise.global_tools]

# Catalog only — version + tool-specific metadata. Per-machine opt-in
# (installation_method) lives in the BOM at
# [data.local.mise.global_tools.<tool>] in .chezmoi.toml.tmpl, matching
# the .local.bin.* convention. Overlays can flip individual tools off by
# setting installation_method = "none" in their own BOM entry.

  [mise.global_tools.python]
  version = "3.14.4"

  [mise.global_tools.pnpm]
  version = "10.33.0"

  [mise.global_tools.java]
  version = "temurin-21.0.2+13.0.LTS"

  [mise.global_tools.rust]
  version = "1.95.0"

  [mise.global_tools.bun]
  version = "1.3.13"

  [mise.global_tools.node]
  version = "22.14.0"

  [mise.global_tools.gemini-cli]
  version = "0.42.0"

  # sandboxr's srt backend (#695: srt-primary decision, backend):
  # enforcement runtime for domain-allowlisted sandboxing. No registry
  # shorthand exists for this package, so the tool key is the fully
  # qualified npm backend spec. Resolved at runtime via `mise where`
  # (sandboxr/backend/srt.py) rather than a hardcoded install path.
  [mise.global_tools."npm:@anthropic-ai/sandbox-runtime"]
  version = "0.0.63"

  # CLI for the Windows-side ollama server (reachable via mirrored networking).
  # No WSL-side server — Windows install is canonical.
  [mise.global_tools.ollama]
  version = "0.30.5"
