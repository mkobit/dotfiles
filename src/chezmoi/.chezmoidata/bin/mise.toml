[mise]
version             = "v2026.5.14"
installation_method = "chezmoi_external"
repo                = "jdx/mise"
external_type       = "file"
executable          = true
checksum_type       = "sha256"
tag_format          = "{version}"
filename_format     = "mise-{version}-{target}"
url_format          = "{base}/{repo}/releases/download/{tag}/{filename}"

# mise version already includes "v" prefix in data — tag_format = "{version}" (no added v)
[mise.platforms]
darwin_arm64 = "macos-arm64"
darwin_amd64 = "macos-x64"
linux_amd64  = "linux-x64"
linux_arm64  = "linux-arm64"

[mise.checksums]
darwin_arm64 = "90e298df8cda4fdbaa5feb538e496b73ba079379b0f7df8fd9d1ac6f994c3fc5"
darwin_amd64 = "2498b6e55d51237d400dc9c14e4dfec50968de1b138959a474fa26d641024635"
linux_amd64  = "849b8419be0a807cdf4e1d451e199347d1524848aadf792238a78ff3ee83351a"
linux_arm64  = "30bd61cb827c263231537cd83acb8e82ddfa47b1ef89dbbaec222d609c72f06f"

[mise.settings]
# Configuration settings: https://mise.jdx.dev/configuration/settings.html
cache_prune_age = "60 days"
disable_hints   = ["self_update"]
http_retries    = 5
install_before  = "7d"
log_level     = "warn"
[mise.settings.npm]
package_manager = "bun"

[mise.global_tools]

  [mise.global_tools.python]
  version             = "3.14.5"
  installation_method = "mise"

  [mise.global_tools.pnpm]
  version             = "10.34.0"
  installation_method = "mise"

  [mise.global_tools.java]
  version             = "temurin-21.0.2+13.0.LTS"
  installation_method = "mise"

  [mise.global_tools.rust]
  version             = "1.95.0"
  installation_method = "mise"

  [mise.global_tools.bun]
  version             = "1.3.14"
  installation_method = "mise"

  [mise.global_tools.node]
  version             = "22.14.0"
  installation_method = "mise"

  [mise.global_tools.gemini-cli]
  version             = "0.44.1"
  installation_method = "mise"
