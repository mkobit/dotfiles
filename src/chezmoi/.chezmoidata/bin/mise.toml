[mise]
version             = "v2026.4.22"
installation_method = "chezmoi_external"
repo                = "jdx/mise"
external_type       = "file"
executable          = true
checksum_type       = "sha256"
tag_format          = "{version}"
filename_format     = "mise-{version}-{target}"
url_format          = "{base}/{repo}/releases/download/{tag}/{filename}"

# mise version already includes "v" prefix in data — tag_format = "{version}" (no added v)
[mise.platforms]
darwin_arm64 = "macos-arm64"
darwin_amd64 = "macos-x64"
linux_amd64  = "linux-x64"
linux_arm64  = "linux-arm64"

[mise.checksums]
darwin_arm64 = "b0646b36130f054a9dcaf6e97a17d83e562c56dbf4d8ca0c7c09cef2065a33bf"
darwin_amd64 = "b634d88e5a9f869fe54926c8fbcfee90d57741d7bc82731b19cb9c0a8741b6a0"
linux_amd64  = "42539398d0ac4a8a0486ded967dfd0e6d9527b268a2c37bad4edd0c446666509"
linux_arm64  = "1b85cffe789d131e47aba05e6c208802572e456afba814d7d081278e812095ff"

[mise.settings]
# Configuration settings: https://mise.jdx.dev/configuration/settings.html
cache_prune_age = "60 days"
disable_hints   = ["self_update"]
http_retries    = 5
install_before  = "7d"
[mise.settings.npm]
package_manager = "bun"

[mise.global_tools]

  [mise.global_tools.python]
  version             = "3.14"
  installation_method = "mise"

  [mise.global_tools.pnpm]
  version             = "10.33.0"
  installation_method = "mise"

  [mise.global_tools.java]
  version             = "temurin-21"
  installation_method = "mise"

  [mise.global_tools.rust]
  version             = "1.95.0"
  installation_method = "mise"

  [mise.global_tools.uv]
  version             = "0.11.7"
  installation_method = "mise"

  [mise.global_tools.bun]
  version             = "1.3.12"
  installation_method = "mise"

  [mise.global_tools.node]
  version             = "22"
  installation_method = "mise"

  [mise.global_tools.gemini-cli]
  version             = "0.39.1"
  installation_method = "mise"
