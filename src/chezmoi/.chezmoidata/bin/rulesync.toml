# Rulesync: A Utility CLI for AI Coding Agents
# Repo: https://github.com/dyoshikawa/rulesync
# Documentation: https://dyoshikawa.github.io/rulesync/
#
# Generates configuration files for various AI development tools from unified AI rule files.
# Features: selective generation, comprehensive import/export capabilities, and supports major AI development tools.

[rulesync]
version             = "8.11.0"
installation_method = "chezmoi_external"
repo                = "dyoshikawa/rulesync"
external_type       = "file"
executable          = true
checksum_type       = "sha256"
tag_format          = "v{version}"
filename_format     = "rulesync-{os}-{target}"
url_format          = "{base}/{repo}/releases/download/{tag}/{filename}"

# rulesync uses {os}-{target} naming where target is the arch alias (x64 not amd64)
[rulesync.platforms]
darwin_arm64 = "arm64"
darwin_amd64 = "x64"
linux_amd64  = "x64"
linux_arm64  = "arm64"

[rulesync.checksums]
darwin_arm64 = "2b8a35a1c66407b99d16bcdef21b43f57d1ff162282f9933d8a0923ac6cd3f77"
