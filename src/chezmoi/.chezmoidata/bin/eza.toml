[bin.eza]
version = "0.23.4"

# eza-community/eza does not publish macOS binaries — darwin uses homebrew
[bin.eza.github_releases]
repo             = "eza-community/eza"
external_type    = "archive-file"
executable       = true
checksum_type    = "sha256"
strip_components = 1
tag_format       = "v{version}"
filename_format  = "eza_{target}.tar.gz"
path_format      = "eza"
url_format       = "{base}/{repo}/releases/download/{tag}/{filename}"

[bin.eza.github_releases.platforms]
linux_amd64 = "x86_64-unknown-linux-musl"
linux_arm64 = "aarch64-unknown-linux-gnu"

[bin.eza.github_releases.checksums]
linux_amd64 = "d231bb3ee33b08c76279b5888845dceb7034d055c42bb9be46dbe0dae39394df"
linux_arm64 = "366e8430225f9955c3dc659b452150c169894833ccfef455e01765e265a3edda"

[bin.eza.homebrew]
name = "eza"

[bin.eza.apt]
name = "eza"
