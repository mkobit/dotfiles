[bin.starship]
version = "1.25.1"

[bin.starship.github_releases]
repo            = "starship/starship"
external_type   = "archive-file"
executable      = true
checksum_type   = "sha256"
tag_format      = "v{version}"
filename_format = "starship-{target}.tar.gz"
path_format     = "starship"
url_format      = "{base}/{repo}/releases/download/{tag}/{filename}"

[bin.starship.github_releases.platforms]
darwin_arm64 = "aarch64-apple-darwin"
darwin_amd64 = "x86_64-apple-darwin"
linux_amd64  = "x86_64-unknown-linux-gnu"
linux_arm64  = "aarch64-unknown-linux-musl"

[bin.starship.github_releases.checksums]
darwin_arm64 = "1062a2363489b9335529b83204472f02633c08fc3609f1b325be5eba36feb631"
