[bat]
version             = "0.26.1"
installation_method = "chezmoi_external"
repo                = "sharkdp/bat"
external_type       = "archive-file"
executable          = true
checksum_type       = "sha256"
tag_format          = "v{version}"
filename_format     = "bat-v{version}-{target}.tar.gz"
path_format         = "bat-v{version}-{target}/bat"
url_format          = "{base}/{repo}/releases/download/{tag}/{filename}"

[bat.package.homebrew]
name = "bat"
type = "formula"

[bat.platforms]
darwin_arm64 = "aarch64-apple-darwin"
darwin_amd64 = "x86_64-apple-darwin"
linux_amd64  = "x86_64-unknown-linux-gnu"
linux_arm64  = "aarch64-unknown-linux-gnu"

