# Sandbox profiles consumed by `sandboxr` (src/python/sandboxr).
#
# Overlay-extensible: override or add profiles via [data.ai.sandbox.*] in an
# overlay chezmoi.toml.tmpl or .chezmoidata/ai/sandbox.toml.
#
# HITL = run agent CLIs directly (claude, agy, opencode). The tool's own
# permission prompts are the UX. Nothing here applies.
#
# Autonomous = run via `sandboxr -- TOOL ARGS`. The wrapper consults this
# data to build the outer sandbox; the tool runs with its own
# --dangerously-skip-permissions (or equivalent) inside it.

[ai.sandbox]
# Profile picked when `sandboxr` is called without --profile and
# $AGENT_RUN_PROFILE is unset.
default_profile = "autonomous"

[ai.sandbox.profiles.autonomous]
enabled = true
# srt (not "auto"): unrestricted ("shared") egress let an autonomous, hours-
# long unsupervised run exfiltrate anything through the harness's own
# session credential -- domain-allowlisted egress is required for the
# default profile, not just the purpose-built srt-claude one. Domain list
# is Claude Code's, copied from the already-verified srt-claude profile
# below -- this profile is Claude-Code-specific until a second harness is
# actually run through sandboxr and gets its own verified list.
backend = "srt"
# Project worktree mounted read-write.
project_write = true
network = "allowlist"
allowed_domains = ["api.anthropic.com", "statsig.anthropic.com", "sentry.io"]
# No agent socket forwarding by default; enable ad-hoc with --ssh-agent.
ssh_agent = false
gpg_agent = false

[ai.sandbox.profiles.autonomous-airgapped]
enabled = true
backend = "auto"
project_write = true
# Completely isolated from the network -- no model API, no package registries.
network = "none"
ssh_agent = false
gpg_agent = false

[ai.sandbox.profiles.readonly]
enabled = true
backend = "auto"
# Project mounted read-only -- for audit / read-only inspection runs.
project_write = false
network = "shared"
ssh_agent = false
gpg_agent = false

[ai.sandbox.profiles.untrusted]
enabled = true
backend = "auto"
# Strictest profile: read-only project, no network, no agent sockets.
# Use this when running code from an untrusted source.
project_write = false
network = "none"
ssh_agent = false
gpg_agent = false

[ai.sandbox.profiles.srt-claude]
enabled = true
# srt (not "auto"): domain-allowlisted egress, no hand-rolled network
# enforcement. See docs/HANDOFF-sandboxr-runtime-decision.md.
backend = "srt"
project_write = true
network = "allowlist"
ssh_agent = false
gpg_agent = false
# Claude Code's known egress set. Provisional — tighten/verify against a
# real run once srt acceptance testing (follow-up #4) actually executes a
# live `claude` session through this profile; don't treat this list as
# already verified.
allowed_domains = ["api.anthropic.com", "statsig.anthropic.com", "sentry.io"]

[ai.sandbox.profiles.chezmoi]
enabled = true
backend = "auto"
# For working on the dotfiles repo itself: needs rw access to the home
# subdirs chezmoi manages so `chezmoi diff` / `chezmoi apply --dry-run`
# can run and verify template renders. Only invoke this profile from
# inside the dotfiles repo — running it on a random project gives a
# malicious agent rw access to most of your $HOME.
project_write = true
network = "shared"
ssh_agent = false
gpg_agent = false
# Broad re-exposes: chezmoi templates can target anywhere under .config,
# .local/share, .local/bin, .local/state. Top-level credential dirs
# (.ssh, .gnupg) stay tmpfs-masked because they're not in this list.
home_rw = [".config", ".local/share", ".local/bin", ".local/state"]
# gh tokens live under .config/gh which would otherwise be exposed by
# the .config rw bind. Mask explicitly to keep the credential boundary.
home_mask = [".config/gh"]
