# Local, commit-or-object-level git operations: no remote/network write, no
# irrecoverable data loss (reflog covers commit history even across rebase).
# Deliberately excluded — do not add:
#   - "git push": the actual remote-write / code-leak risk this list is
#     scoped around; always prompt.
#   - "git reset", "git clean": can permanently destroy uncommitted/untracked
#     work with no reflog entry to recover from, and command-head matching
#     can't separate safe flags (--soft) from destructive ones (--hard, -fd);
#     always prompt for both, in full.
[ai.command_policy.commands]
"git add" = true
"git blame" = true
"git branch" = true
"git checkout" = true
"git cherry-pick" = true
"git commit" = true
"git diff" = true
"git fetch" = true
"git log" = true
"git merge" = true
"git pull" = true
"git rebase" = true
"git restore" = true
"git show" = true
"git stash" = true
"git status" = true
"git switch" = true
"git worktree list" = true
