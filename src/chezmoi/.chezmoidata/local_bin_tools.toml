# Local Python tools installed via uv from src/python/ workspace.
# Set installation_method = "none" to skip on machines where you don't want them.

[local_bin_tools.claude_statusline]
installation_method = "dotfiles.uv"

[local_bin_tools.jules]
installation_method = "dotfiles.uv"

[local_bin_tools.transcribe]
installation_method = "dotfiles.uv"

[local_bin_tools.termbud]
installation_method = "dotfiles.uv"
