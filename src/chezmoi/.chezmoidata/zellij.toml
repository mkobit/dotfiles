# Zellij data defaults.
# Work repo injects config overrides via [data.zellij.config] in chezmoi-personal.toml.tmpl.
# Layout files live in dot_config/zellij/layouts/ — each repo owns its own.
# Docs: https://zellij.dev/documentation/creating-a-layout

[zellij.config]
scrollback_lines_to_serialize = 75000
show_startup_tips             = true
