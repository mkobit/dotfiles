# ASDF Version Manager configuration
# Manages asdf binary installation and plugin configuration
#
# Binary installation:
# - Downloaded via .chezmoiexternals to ~/.local/bin/asdf
# - Platform-specific checksums ensure integrity
#
# Plugin management:
# - run_once_install-asdf.sh.tmpl syncs plugins (install/remove)
# - All plugins use official shortnames from https://github.com/asdf-vm/asdf-plugins
# - Tool versions are managed per-project via .tool-versions files
#
# References:
# - https://asdf-vm.com/guide/getting-started.html
# - https://github.com/asdf-vm/asdf/releases

[asdf]
  installation = "disabled"
  version = "0.18.1"

  # Language version management plugins
  # Plugins are installed/removed based on this array
  plugins = [
    { name = "nodejs" },     # https://github.com/asdf-vm/asdf-nodejs
    { name = "python" },     # https://github.com/danhper/asdf-python
    { name = "java" },       # https://github.com/halcyon/asdf-java
    { name = "golang" },     # https://github.com/asdf-community/asdf-golang
    { name = "rust" },       # https://github.com/code-lever/asdf-rust
  ]

[asdf.checksums]
darwin_arm64 = "8d738bdd18f24abda7a6750cec601c69991b25827386894161cbba7646b7846b"
darwin_amd64 = "16d4daaa7062671ee4d3574dd4c1809495753179d27ccdf530d6567d2f98e5c2"
linux_amd64 = "56141dc99eab75c140dcdd85cf73f3b82fed2485a8dccd4f11a4dc5cbcb6ea5c"
linux_arm64 = "1850faf576cab7acb321e99dd98d3fe0d4665e1331086ad9ed991aeec1dc9d36"