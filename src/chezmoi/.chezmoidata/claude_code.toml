[claude_code]
version = "2.1.197"

# Deployment config → managed via modify_settings.json.tmpl → ~/.claude/settings.json
# These are operator/admin-level settings: permissions, env, tooling behavior.
# See: https://docs.anthropic.com/en/docs/claude-code/settings
[claude_code.settings]
cleanupPeriodDays = 30
outputStyle = "concise"
# Documented top-level settings.json key (code.claude.com/docs/en/settings).
# Confirmed this is the real, functionally-effective location: the live
# ~/.claude/settings.json already had editorMode = "vim" before this entry
# was ever added (from toggling /config previously) -- Claude Code itself
# reads/writes it here. Also still injected into ~/.claude.json via
# claude_code.preferences + modify_dot_claude.json.tmpl (PR #718); that's
# the wrong file per docs (~/.claude.json is OAuth/MCP/trust-state/caches,
# not settings) and looks like dead weight, same pattern as the removed
# tools/files keys above -- not removed yet only to avoid touching a file
# modified on a separate open PR branch. Remove that injection once both
# PRs are merged.
editorMode = "vim"

# UI preferences → managed via modify_dot_claude.json.tmpl → ~/.claude.json
# Claude Code stores user-facing preferences (editorMode, etc.) in ~/.claude.json,
# which it also uses as a mutable runtime state file (startup counts, feature flags, etc.).
# We only inject our preferences — the rest of the file is left alone.
[claude_code.preferences]
editorMode = "vim"

[claude_code.settings.sandbox]
# Disabled globally due to current complexity using existing tools like git
enabled = false
failIfUnavailable = false

[claude_code.settings.statusLine]
type = "command"
command = "statusline claude render"

# permissions.allow/.deny is computed at render time from
# ai.command_policy.commands (.chezmoidata/ai/command_policy/*.toml) —
# see dot_claude/modify_settings.json. (Previously this table set
# tools/files = "allow" here, but neither key exists in Claude Code's
# documented permissions schema — removed as inert.)

[claude_code.settings.env]
DISABLE_AUTOUPDATER = "true"
DISABLE_TELEMETRY = "true"
ENABLE_TOOL_SEARCH = "true"
