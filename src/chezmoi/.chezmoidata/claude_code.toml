[claude_code]
enabled = true
version = "2.1.63"
installation = "external-script"

[claude_code.settings]
# https://code.claude.com/docs/en/settings
cleanupPeriodDays = 30
outputStyle = "concise"
# https://code.claude.com/docs/en/terminal-config#vim-mode
editorMode = "vim"

[claude_code.settings.statusLine]
type = "command"
command = "claude_statusline"

[claude_code.settings.permissions]
tools = "allow"
files = "allow"

[claude_code.settings.env]
DISABLE_AUTOUPDATER = "true"
DISABLE_TELEMETRY = "true"
