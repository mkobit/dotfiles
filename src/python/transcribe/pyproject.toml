[project]
name = "transcribe"
version = "0.0.0"
requires-python = ">=3.14"
dependencies = [
    "faster-whisper>=1",
    "jinja2>=3",
    "tqdm>=4",
    "typer>=0.24.2",
]

[project.scripts]
transcribe = "transcribe.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
