[project]
name = "claude-statusline"
version = "0.0.0"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.12.5",
]

[project.scripts]
claude-statusline = "claude_statusline.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pyright>=1.1.408",
    "pytest>=9.0.2",
    "ruff>=0.15.7",
]
