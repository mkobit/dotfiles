[project]
name = "termstatus"
version = "0.0.0"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.12.5",
    "rich>=14",
    "typer>=0.15.1",
    "whenever>=0.9.5",
]

[project.scripts]
statusline = "termstatus.main:cli"

[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.15.7",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
