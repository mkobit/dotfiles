[project]
name = "skill-filter"
version = "0.0.0"
requires-python = ">=3.8"
# No runtime dependencies: executed by system python3 at chezmoi apply time, before uv/mise exist.
# requires-python targets the runtime contract; dev tooling (uv workspace) runs on >=3.14.
dependencies = []

[project.scripts]
skill-filter = "skill_filter.main:main"

[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.15.7",
]

[tool.ruff.lint]
ignore = ["UP045", "UP007"] # Allow Optional/Union over X | None to support py3.9
