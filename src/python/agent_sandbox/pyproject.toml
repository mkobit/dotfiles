[project]
name = "agent-sandbox"
version = "0.0.0"
description = "bwrap sandbox wrapper for autonomous AI agent runs"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.0.0",
    "typer>=0.15.1",
]

[project.scripts]
agent-run = "agent_sandbox.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear (common footguns)
    "SIM",  # flake8-simplify
    "PLC",  # pylint convention — PLC0415 catches import-outside-toplevel / __import__()
    "S",    # bandit security checks
    "RUF",  # ruff-specific rules
]
ignore = [
    "S603",  # subprocess call without shell=True — we always use shell=False
    "S606",  # os.execvp — intentional, not a shell injection risk here
    "S108",  # /tmp hardcoded — intentional bwrap mount target (noqa also in place)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]  # assert is expected in tests
