[project]
name = "agent-sandbox"
version = "0.0.0"
description = "bwrap sandbox wrapper for autonomous AI agent runs"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.0.0",
    "typer>=0.15.1",
]

[project.scripts]
agent-run = "agent_sandbox.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
